services:
  db:
    image: postgres:16-alpine
    container_name: gastitos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gastitos
      POSTGRES_PASSWORD: gastitos123
      POSTGRES_DB: gastitos_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gastitos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save 20 1 --loglevel warning

volumes:
  pgdata:
  redisdata:
